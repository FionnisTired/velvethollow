<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velvet Hollow Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <canvas id="gameCanvas" width="1280" height="720" aria-label="Velvet Hollow side-scrolling platformer prototype"></canvas>
    <section class="hud-note" aria-hidden="true">
      <strong>Velvet Hollow</strong>
      <span>Move: A/D or Arrows</span>
      <span>Jump: W/Up/Space</span>
      <span>Dash: Shift/J</span>
      <span>Pause: Esc/P</span>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
